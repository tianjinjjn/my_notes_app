name: 诊断项目文件
on: [push, workflow_dispatch]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          pwd
          ls -la
          test -f pubspec.yaml && echo "OK: pubspec.yaml 存在" || echo "ERROR: pubspec.yaml 不存在"
          test -f lib/main.dart && echo "OK: lib/main.dart 存在" || echo "ERROR: lib/main.dart 不存在"
