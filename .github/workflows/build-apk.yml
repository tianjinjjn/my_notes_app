name: Build APK
on: [push, workflow_dispatch]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 自动修复 Android 编译配置
        run: |
          rm -f android/build.gradle.kts android/app/build.gradle.kts
          if [ -f android/app/build.gradle ]; then
            sed -i 's/compileSdk = [0-9]*/compileSdk = 34/' android/app/build.gradle
            sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "28.2.13676358"/' android/app/build.gradle
          fi
          if [ -f android/build.gradle ]; then
            sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/" android/build.gradle
          fi
          if [ -f android/settings.gradle ]; then
            sed -i "s/kotlin_version = '.*'/kotlin_version = '1.9.22'/" android/settings.gradle
          fi
          # 优化 Gradle 构建
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "org.gradle.caching=true" >> android/gradle.properties

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'

      - run: flutter pub get
      - run: flutter build apk --release --no-shrink 2>&1 | tee build.log
      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
